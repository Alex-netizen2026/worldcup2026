name: Update World Cup Scores

on:
  workflow_dispatch:

  schedule:
    - cron: "0 5 * * *"
    - cron: "0 19 * * *"

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run FIFA parser
        run: |
          python fifa_parser.py

      - name: Run update script
        run: |
          python update_scores.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add worldcup2026_fixtures.csv
          git add manual_scores.csv
          git add worldcup2026_scores.csv
          git add worldcup2026_history.csv
          git add update_log.csv

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update World Cup data"
            git push
          fi
