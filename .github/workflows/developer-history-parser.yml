name: Developer History FIFA Parser

on:
  workflow_dispatch:

jobs:
  developer-history-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run developer history parser
        run: |
          python developer_history_parser.py
