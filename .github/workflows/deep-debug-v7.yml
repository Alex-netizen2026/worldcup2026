name: FIFA World Cup 2026 Parser v7 DEEP DEBUG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deep-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout v7 branch
        uses: actions/checkout@v4
        with:
          ref: v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run deep debug parser
        run: |
          python fifa_parser_v7_deep_debug.py

      - name: Commit deep debug JSON to v7
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deep_debug_v7/*.json
          git diff --cached --quiet || git commit -m "Deep debug FIFA v7 match details"
          git push origin v7
