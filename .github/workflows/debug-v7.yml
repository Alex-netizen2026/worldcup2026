name: FIFA World Cup 2026 Parser v7 DEBUG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug-fifa-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout v7 branch
        uses: actions/checkout@v4
        with:
          ref: v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run FIFA parser v7 debug
        run: |
          python fifa_parser_v7_debug.py

      - name: Commit debug JSON to v7
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add debug_v7/*.json
          git diff --cached --quiet || git commit -m "Debug FIFA v7 extra time JSON"
          git push origin v7
